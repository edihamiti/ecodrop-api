info:
  name: reset
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/ecodrop/db/reset
  headers:
    - name: Authorization
      value: Bearer {{adminToken}}
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
