info:
  name: PATCH 200 - mettre à jour collection-point
  type: http
  seq: 5

http:
  method: PATCH
  url: http://localhost:8080/ecodrop/points/1
  headers:
    - name: Authorization
      value: Bearer {{adminToken}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "adresse": "12 Rue de la Paix",
        "capaciteMax": 500
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

