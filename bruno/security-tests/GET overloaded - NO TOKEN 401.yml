info:
  name: GET overloaded - NO TOKEN 401
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8080/ecodrop/points/overloaded
  headers:
    - name: Accept
      value: application/json
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
