info:
  name: GET 200 - leaderboard avec limit et offset
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:8080/ecodrop/users/leaderboard?limit=5&offset=0
  headers:
    - name: Accept
      value: application/json
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
