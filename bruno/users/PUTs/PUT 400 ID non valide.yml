info:
  name: PUT 400 - ID non valide user
  type: http
  seq: 2

http:
  method: PUT
  url: http://localhost:8080/ecodrop/users/abc
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "login": "test",
        "password": "test",
        "role": "USER"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
