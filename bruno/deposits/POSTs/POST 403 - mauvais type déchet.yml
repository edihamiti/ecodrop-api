info:
  name: POST 403 - mauvais type déchet
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8080/ecodrop/deposits/
  headers:
    - name: Authorization
      value: Bearer {{userToken}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "userId": 1,
        "point": { "id": 8 },
        "wasteType": { "id": 1 },
        "weight": 1,
        "dateDepot": "2025-12-03"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "403"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
