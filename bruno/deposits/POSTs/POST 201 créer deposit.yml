info:
  name: POST 201 - créer deposit
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/ecodrop/deposits/
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "userId": 1,
        "point": { "id": 1 },
        "wasteType": { "id": 1 },
        "weight": 1,
        "dateDepot": "2026-03-16 11:02:56.174909"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
