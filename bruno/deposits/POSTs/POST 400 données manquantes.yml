info:
  name: POST 400 - données manquantes
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/ecodrop/deposits/
  headers:
    - name: Authorization
      value: Bearer {{userToken}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "userId": 1,
        "weight": 3.5
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

