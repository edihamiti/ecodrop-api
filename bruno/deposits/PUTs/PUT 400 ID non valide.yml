info:
  name: PUT 400 - ID non valide
  type: http
  seq: 2

http:
  method: PUT
  url: http://localhost:8080/ecodrop/deposits/abc
  headers:
    - name: Authorization
      value: Bearer {{adminToken}}
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "userId": 1,
        "point": { "id": 1 },
        "wasteType": { "id": 1 },
        "weight": 12.5
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

